# lib/solution-schema.yaml — Valid values for solution doc frontmatter
# Used by validate-solution-doc.sh to enforce schema

problem_type:
  - data_quality_issue
  - runtime_error
  - performance_issue
  - config_error
  - integration_issue
  - test_failure

component:
  - data_loading
  - data_translation
  - model_execution
  - reporting
  - pipeline
  - testing
  - infrastructure

severity:
  - critical
  - high
  - medium
  - low

root_cause:
  - missing_validation
  - type_mismatch
  - memory_overflow
  - null_handling
  - config_mismatch
  - api_misuse
  - race_condition
  - schema_drift

resolution_type:
  - code_fix
  - config_change
  - workaround
  - documentation
  - dependency_update

scope:
  - universal
  - conditional

status:
  - active
  - deprecated
  - superseded
